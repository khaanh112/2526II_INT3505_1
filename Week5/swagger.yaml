openapi: 3.0.0
info:
  title: Week 5 Flask API
  description: API for products, categories, users, and orders with pagination support.
  version: 1.0.0
servers:
  - url: http://localhost:5000
    description: Local development server
paths:
  /v1/products:
    get:
      summary: Get all products
      description: Returns a list of products with support for pagination (offset-limit, page-based, or cursor-based) and filtering by category.
      parameters:
        - name: category
          in: query
          description: Category ID to filter products
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of items to return
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          description: Number of items to skip (Offset-limit strategy)
          schema:
            type: integer
        - name: page
          in: query
          description: Current page number (Page-based strategy)
          schema:
            type: integer
        - name: per_page
          in: query
          description: Number of items per page (Page-based strategy)
          schema:
            type: integer
            default: 10
        - name: after_id
          in: query
          description: Last item ID received for next page (Cursor-based strategy)
          schema:
            type: string
      responses:
        '200':
          description: A list of products and metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
                  metadata:
                    type: object
                    properties:
                      total:
                        type: integer
                      count:
                        type: integer
                      strategy:
                        type: string
  /v1/products/{product_id}:
    get:
      summary: Get a product by ID
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Product not found
  /v1/categories:
    get:
      summary: Get all categories
      responses:
        '200':
          description: A list of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
  /v1/categories/{category_id}/products:
    get:
      summary: Get products in a category
      parameters:
        - name: category_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of products in the category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
  /v1/users/{user_id}:
    get:
      summary: Get user profile
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /v1/users/{user_id}/cart:
    get:
      summary: Get user cart
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User cart details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
  /v1/users/{user_id}/cart/items:
    post:
      summary: Add item to cart
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                product_id:
                  type: string
                quantity:
                  type: integer
                  default: 1
      responses:
        '200':
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
  /v1/users/{user_id}/orders:
    get:
      summary: Get user orders
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of user orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
    post:
      summary: Place an order
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: New order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Cart is empty
components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
        category_id:
          type: string
        stock:
          type: integer
    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
    Cart:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: string
              quantity:
                type: integer
        total:
          type: number
    Order:
      type: object
      properties:
        order_id:
          type: string
        status:
          type: string
        items:
          type: array
          items:
            type: object
        total:
          type: number
