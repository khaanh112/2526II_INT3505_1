<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Google OAuth Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-glow: rgba(56, 189, 248, 0.4);
            --success-color: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            backdrop-filter: blur(12px);
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 40px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .profile-image {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid var(--accent-glow);
            object-fit: cover;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .profile-info h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .profile-info p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
            border-radius: 99px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 12px;
        }

        .status-bullet {
            width: 8px;
            height: 8px;
            background: var(--success-color);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .data-section {
            margin-top: 20px;
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 20px;
        }

        .data-card {
            background: rgba(15, 23, 42, 0.5);
            padding: 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .data-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .data-value {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-main);
            word-break: break-all;
        }

        .logout-btn {
            margin-top: 40px;
            display: inline-block;
            padding: 12px 30px;
            background: transparent;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.2);
        }

        .json-preview {
            margin-top: 30px;
            text-align: left;
            background: #000;
            padding: 20px;
            border-radius: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.8rem;
            color: #38bdf8;
            overflow-x: auto;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }
    </style>
</head>
<body>
    <div class="container" id="profile-card">
        <div class="profile-header">
            <img src="{{ user.picture }}" alt="Profile Picture" class="profile-image" id="user-avatar">
            <div class="profile-info">
                 <h1 id="user-name">{{ user.name }}</h1>
                 <p id="user-email">{{ user.email }}</p>
                 <div class="status-badge">
                     <span class="status-bullet"></span>
                     Authenticated via Google
                 </div>
            </div>
        </div>

        <div class="data-section">
            <div class="data-grid">
                <div class="data-card">
                    <div class="data-label">Provider</div>
                    <div class="data-value">Google OAuth 2.0</div>
                </div>
                <div class="data-card">
                    <div class="data-label">Verified Email</div>
                    <div class="data-value">{{ 'Yes' if user.email_verified else 'No' }}</div>
                </div>
                <div class="data-card">
                    <div class="data-label">Preferred Locale</div>
                    <div class="data-value">{{ user.get('locale', 'en') | upper }}</div>
                </div>
                <div class="data-card">
                    <div class="data-label">User ID (Sub)</div>
                    <div class="data-value">{{ user.sub[:12] }}...</div>
                </div>
            </div>
        </div>

        <div class="json-preview">
            <pre id="raw-json">{{ user_json }}</pre>
        </div>

        <a href="/logout" class="logout-btn" id="logout-btn">Log Out</a>
    </div>
</body>
</html>
